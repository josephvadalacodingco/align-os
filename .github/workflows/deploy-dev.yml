name: deploy-dev

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_stage:
        description: "core | db | full"
        required: true
        default: "db"
        type: choice
        options:
          - core
          - db
          - full

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-align-os-dev
  LOCATION: eastus
  PARAM_FILE: infra/params/align-os.dev.bicepparam

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Ensure resource group exists
        run: |
          az group create \
            --name "$RESOURCE_GROUP" \
            --location "$LOCATION"

      - name: Extract ACR name from param file
        id: acr
        shell: bash
        run: |
          ACR_NAME=$(grep "param acrName" "$PARAM_FILE" | awk -F"'" '{print $2}')
          echo "acr_name=$ACR_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy bootstrap infra
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters "$PARAM_FILE" \
                         postgresAdminPassword='${{ secrets.POSTGRES_ADMIN_PASSWORD }}' \
            --parameters deployStage=bootstrap

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry "${{ steps.acr.outputs.acr_name }}" \
            --image "web:${{ github.sha }}" \
            --file app/Dockerfile \
            app

      - name: Deploy requested stage
        run: |
          az deployment group create \
            --resource-group "$RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters "$PARAM_FILE" \
                         postgresAdminPassword='${{ secrets.POSTGRES_ADMIN_PASSWORD }}' \
            --parameters deployStage=${{ github.event.inputs.deploy_stage || 'db' }} \
                         imageTag=${{ github.sha }}