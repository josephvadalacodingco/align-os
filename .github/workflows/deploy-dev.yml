name: deploy-dev

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_stage:
        description: "core | db | full"
        required: true
        default: "core"

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-align-os-dev
  LOCATION: eastus
  PARAM_FILE: infra/params/align-os.dev.bicepparam

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 🔑 Azure login (OIDC)
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # 🔧 Ensure RG exists
      - name: Create resource group if needed
        run: |
          az group create \
            --name $RESOURCE_GROUP \
            --location $LOCATION

      # 📦 Get ACR name from params (simple extraction)
      - name: Extract ACR name
        id: acr
        run: |
          ACR_NAME=$(grep "param acrName" $PARAM_FILE | awk -F"'" '{print $2}')
          echo "acr_name=$ACR_NAME" >> $GITHUB_OUTPUT

      # 🐳 Build & push image
      - name: Build and push image
        run: |
          az acr build \
            --registry ${{ steps.acr.outputs.acr_name }} \
            --image web:${{ github.sha }} \
            ./src

      # 🚀 Deploy infra
      - name: Deploy Bicep
        run: |
          az deployment group create \
            --resource-group $RESOURCE_GROUP \
            --template-file infra/main.bicep \
            --parameters $PARAM_FILE \
            --parameters deployStage=${{ github.event.inputs.deploy_stage || 'core' }} \
                         imageTag=${{ github.sha }}